<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #f9f9f9;
        }

<body class="font-body-md text-on-background flex flex-col min-h-screen">
<main class="flex-grow flex items-center justify-center px-gutter py-xl relative overflow-hidden">
<!-- Abstract background elements for Institutional Trust feel -->
<div class="absolute top-0 left-0 w-full h-full pointer-events-none z-0 opacity-20">
<div class="absolute -top-1/4 -right-1/4 w-[600px] h-[600px] bg-secondary-container rounded-full blur-3xl"></div>
<div class="absolute -bottom-1/4 -left-1/4 w-[500px] h-[500px] bg-primary-container rounded-full blur-3xl"></div>
</div>
<div class="w-full max-w-md z-10">
<div class="text-center mb-lg">
<div class="inline-flex items-center justify-center p-sm bg-primary-container text-on-primary mb-md rounded-xl">
<span class="material-symbols-outlined !text-[32px]">account_balance</span>
</div>
<h1 class="font-h2 text-h2 text-primary mb-xs">Apex Banking</h1>
<p class="font-body-md text-secondary">Secure Institutional Portal</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-lg p-lg shadow-sm">
<form class="space-y-md" id="loginForm" method="POST">
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant block" for="email">EMAIL ADDRESS</label>
<div class="relative">
<input class="w-full h-12 px-md border border-outline rounded-lg bg-surface-container-lowest focus:ring-2 focus:ring-primary focus:border-primary transition-all font-body-md text-on-surface placeholder:text-outline/50" id="email" name="email" placeholder="name@corporate.com" required="" type="email"/>
</div>
</div>
<div class="space-y-xs">
<div class="flex justify-between items-center">
<label class="font-label-caps text-label-caps text-on-surface-variant block" for="password">PASSWORD</label>
<a class="font-label-caps text-[11px] text-secondary hover:text-primary transition-colors" href="#">FORGOT PASSWORD?</a>
</div>
<div class="relative">
<input class="w-full h-12 px-md border border-outline rounded-lg bg-surface-container-lowest focus:ring-2 focus:ring-primary focus:border-primary transition-all font-body-md text-on-surface placeholder:text-outline/50" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<div class="pt-sm">
<button class="w-full h-12 bg-primary text-on-primary font-button text-button rounded-lg hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-sm" type="submit">
                            Sign In
                            <span class="material-symbols-outlined text-[18px]">login</span>
</button>
</div>
</form>
<div class="mt-lg pt-md border-t border-outline-variant flex flex-col items-center gap-sm">
<p class="font-body-sm text-on-surface-variant">Don't have an account yet?</p>
<a class="font-button text-button text-primary border border-primary px-lg py-sm rounded-lg hover:bg-surface-container-low transition-all" href="register.html">
                        Register
                    </a>
</div>
</div>
<!-- Trust Badge -->
<div class="mt-lg flex items-center justify-center gap-sm opacity-60">
<span class="material-symbols-outlined text-[16px]">verified_user</span>
<span class="font-label-caps text-[10px]">256-BIT ENCRYPTION ACTIVE</span>
</div>
</div>
</main>
<footer class="py-md text-center">
<p class="font-label-caps text-[11px] text-outline">
            © 2024 Apex Banking. All rights reserved. Member FDIC. Equal Housing Lender.
        </p>
</footer>
<script src="../assets/js/modules/auth.js" type="module"></script>
</body></html>
